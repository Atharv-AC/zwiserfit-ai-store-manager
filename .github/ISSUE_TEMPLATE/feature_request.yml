name: 💡 Feature Request
description: 提出一个新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请描述你需要什么功能以及为什么。

  - type: textarea
    id: problem
    attributes:
      label: 解决什么问题
      description: 这个功能解决了什么痛点？
      placeholder: 当...的时候，我觉得很不方便，因为...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 你期望的解决方案
      description: 清晰简洁地描述你想要的
      placeholder: 我希望系统可以...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过哪些替代方案？
      placeholder: 目前我用...来临时解决

  - type: dropdown
    id: scope
    attributes:
      label: 影响范围
      options:
        - AI Agent 行为 / Agent Behavior
        - IoT 数据管道 / Data Pipeline
        - 开发者体验 / DX
        - 文档 / Documentation
        - 其他
    validations:
      required: true
